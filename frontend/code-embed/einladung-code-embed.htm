<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;font-family:var(--sans);">
  <div style="text-align:center;color:var(--text-light);">
    <div style="font-family:var(--serif);font-size:20px;font-weight:600;color:var(--navy);margin-bottom:1rem;">
      exart<span style="font-family:var(--sans);font-size:9px;color:var(--gold);letter-spacing:0.1em;vertical-align:super;">.io</span>
